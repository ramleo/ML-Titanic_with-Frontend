<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ml Titanic With Frontend</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:  #0d47a1;
      --accent:   #1565c0;
      --btn:      #1565c0;
      --btn-hov:  #0d47a1;
      --body-bg:  #e3f2fd;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--body-bg); min-height: 100vh; color: #1a1a2e;
    }
    /* Header */
    .hdr {
      background: linear-gradient(135deg,rgba(13,71,161,.58) 0%,rgba(1,87,155,.65) 100%),url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1400&h=560&fit=crop&auto=format&q=85') center/cover no-repeat;
      background-size: cover;
      background-position: center;
      color: white;
      padding: 72px 32px 64px; text-align: center;
      position: relative;
    }
    .hdr h1 { font-size: 2.6rem; font-weight: 800; letter-spacing: -0.5px; text-shadow: 0 2px 12px rgba(0,0,0,0.55); margin-bottom: 10px; }
    .hdr p  { opacity: 0.95; margin-top: 0; font-size: 1.1rem; text-shadow: 0 1px 6px rgba(0,0,0,0.45); }
    /* Container */
    .ctr { max-width: 880px; margin: 0 auto; padding: 36px 20px 64px; }
    /* Card */
    .card {
      background: white; border-radius: 20px;
      box-shadow: 0 8px 36px rgba(0,0,0,0.10); padding: 36px;
    }
    .card-ttl {
      font-size: 1.1rem; font-weight: 700; color: var(--primary);
      margin-bottom: 24px; border-bottom: 2px solid var(--body-bg);
      padding-bottom: 14px;
    }
    /* Form grid */
    .fgrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 18px; margin-bottom: 28px;
    }
    .field label {
      display: block; font-size: 0.73rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: #888; margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 11px 14px;
      border: 2px solid #e8eaed; border-radius: 10px;
      font-size: 0.97rem; color: #1a1a2e; outline: none;
      background: #fafafa;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #1565c033;
      background: white;
    }
    .field input::placeholder { color: #c0c0c0; }
    /* Button */
    .btn-p {
      width: 100%; padding: 15px;
      background: var(--btn); color: white; border: none;
      border-radius: 12px; font-size: 1.1rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.02em;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
      transition: background 0.2s, transform 0.12s, box-shadow 0.2s;
    }
    .btn-p:hover  { background: var(--btn-hov); box-shadow: 0 6px 18px rgba(0,0,0,0.2); }
    .btn-p:active { transform: scale(0.99); }
    .btn-p:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; }
    /* Result */
    .result {
      margin-top: 28px; padding: 24px 28px;
      background: var(--body-bg); border-radius: 14px;
      border-left: 5px solid var(--accent);
      display: none; animation: slideIn 0.32s ease;
    }
    .result.show { display: block; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .res-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
    .res-lbl { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #aaa; }
    .res-val { font-size: 2rem; font-weight: 800; color: var(--primary); }
    /* Probability bars */
    .prob-sec { margin-top: 18px; }
    .prob-ttl { font-size: 0.73rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #bbb; margin-bottom: 12px; }
    .prob-item { margin-bottom: 10px; }
    .prob-hdr  { display: flex; justify-content: space-between; font-size: 0.85rem; color: #555; margin-bottom: 5px; font-weight: 500; }
    .prob-bg   { height: 10px; background: #e5e7eb; border-radius: 5px; overflow: hidden; }
    .prob-fill {
      height: 10px; border-radius: 5px; background: var(--accent);
      transition: width 0.6s cubic-bezier(.4,0,.2,1); width: 0;
    }
    .err { color: #dc2626; font-size: 0.9rem; font-weight: 500; margin-top: 8px; }
    /* Spinner */
    .spin {
      display: inline-block; width: 17px; height: 17px;
      border: 3px solid rgba(255,255,255,0.35);
      border-top-color: white; border-radius: 50%;
      animation: rot 0.75s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes rot { to { transform: rotate(360deg); } }
    /* Server status bar */
    .srv-bar { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; font-weight: 600; color: #666; margin-bottom: 20px; padding: 9px 14px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e8eaed; }
    .srv-dot { width: 9px; height: 9px; border-radius: 50%; background: #d1d5db; flex-shrink: 0; transition: background 0.3s; }
    .srv-dot.online  { background: #22c55e; }
    .srv-dot.offline { background: #ef4444; }
    .srv-dot.checking { animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    /* Footer */
    .ftr { text-align: center; padding: 28px; color: #ccc; font-size: 0.82rem; }
    .ftr a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .ftr a:hover { text-decoration: underline; }
    @media (max-width: 520px) {
      .hdr h1 { font-size: 1.5rem; }
      .card   { padding: 22px 16px; }
      .res-val { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="hdr">
  <h1>Ml Titanic With Frontend</h1>
  <p>AI-powered survival prediction</p>
</div>

<div class="ctr">
  <div class="card">
    <div class="srv-bar">
      <span class="srv-dot checking" id="srvDot"></span>
      <span id="srvTxt">Checking serverâ¦</span>
    </div>
    <div class="card-ttl">Enter values and click Predict</div>
    <form id="pForm">
      <div class="fgrid">
        <div class="field">
          <label>Passengerid</label>
          <input type="number" name="PassengerId" placeholder="e.g. 0" step="any">
        </div>
        <div class="field">
          <label>Pclass</label>
          <input type="number" name="Pclass" placeholder="e.g. 0" step="any">
        </div>
        <div class="field">
          <label>Age</label>
          <input type="number" name="Age" placeholder="e.g. 0" step="any">
        </div>
        <div class="field">
          <label>Sibsp</label>
          <input type="number" name="SibSp" placeholder="e.g. 0" step="any">
        </div>
        <div class="field">
          <label>Parch</label>
          <input type="number" name="Parch" placeholder="e.g. 0" step="any">
        </div>
        <div class="field">
          <label>Fare</label>
          <input type="number" name="Fare" placeholder="e.g. 0" step="any">
        </div>
        <div class="field">
          <label>Name</label>
          <input type="text" name="Name" placeholder="Enter value">
        </div>
        <div class="field">
          <label>Sex</label>
          <input type="text" name="Sex" placeholder="Enter value">
        </div>
        <div class="field">
          <label>Ticket</label>
          <input type="text" name="Ticket" placeholder="Enter value">
        </div>
        <div class="field">
          <label>Embarked</label>
          <input type="text" name="Embarked" placeholder="Enter value">
        </div>
      </div>
      <button type="submit" class="btn-p" id="pBtn">&#x1F50D;&nbsp; Predict</button>
    </form>
    <div class="result" id="result">
      <div class="res-row">
        <span class="res-lbl">Prediction</span>
        <span class="res-val" id="resVal">—</span>
      </div>
      <div class="prob-sec" id="probSec" style="display:none">
        <div class="prob-ttl">Confidence</div>
        <div id="probBars"></div>
      </div>
      <div class="err" id="errMsg"></div>
    </div>
  </div>
</div>

<div class="ftr">
  Powered by <a href="/docs" target="_blank">FastAPI ML API</a> &nbsp;&middot;&nbsp; <a href="/health" target="_blank">Health check</a>
</div>

<script>
  var IS_CLASS = true;
  var CLASSES  = ["0", "1"];

  var form    = document.getElementById("pForm");
  var result  = document.getElementById("result");
  var resVal  = document.getElementById("resVal");
  var probSec = document.getElementById("probSec");
  var probBars= document.getElementById("probBars");
  var errMsg  = document.getElementById("errMsg");
  var pBtn    = document.getElementById("pBtn");
  var srvDot  = document.getElementById("srvDot");
  var srvTxt  = document.getElementById("srvTxt");

  // ── Server health check with cold-start retry ───────────────────
  // Render free tier spins down after 15 min; the model takes a few
  // seconds to load after waking up.  We poll /health every 5 s and
  // keep the Predict button disabled until the server is truly ready.
  var _healthTimer = null;
  var _serverReady = false;

  function setServerState(state, msg) {
    srvDot.className = "srv-dot " + state;
    srvTxt.textContent = msg;
    _serverReady = (state === "online");
    pBtn.disabled = !_serverReady;
    pBtn.style.opacity = _serverReady ? "1" : "0.5";
    pBtn.title = _serverReady ? "" : "Waiting for server to become readyâ¦";
  }

  function checkServer() {
    setServerState("checking", "Checking serverâ¦");
    fetch("/health")
      .then(function(r) {
        if (r.ok) {
          return r.json().then(function(d) {
            if (d && d.status === "ok") {
              setServerState("online", "Server online");
              if (_healthTimer) { clearInterval(_healthTimer); _healthTimer = null; }
            } else {
              setServerState("offline", "Server warming upâ¦ retrying");
            }
          });
        } else {
          setServerState("offline", "Server error (HTTP " + r.status + ") â retrying");
        }
      })
      .catch(function() {
        setServerState("offline", "Server offline â run: uvicorn app:app --reload");
        if (_healthTimer) { clearInterval(_healthTimer); _healthTimer = null; }
      });
  }
  checkServer();
  _healthTimer = setInterval(checkServer, 5000);

  form.addEventListener("submit", function(e) {
    e.preventDefault();
    if (!_serverReady) {
      errMsg.style.whiteSpace = "pre-wrap";
      errMsg.textContent = "Server is not ready yet.\nPlease wait until the status shows Server online.";
      result.classList.add("show");
      return;
    }
    var payload = {};
    form.querySelectorAll("input").forEach(function(el) {
      var v = el.value.trim();
      if (v !== "") payload[el.name] = (el.type === "number" && !isNaN(v)) ? parseFloat(v) : v;
    });

    pBtn.disabled = true;
    pBtn.innerHTML = '<span class="spin"></span>Predicting&#x2026;';
    result.classList.remove("show");
    errMsg.textContent = "";
    probSec.style.display = "none";
    probBars.innerHTML = "";

    fetch("/predict", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    })
    .then(function(r) {
      if (!r.ok) return r.text().then(function(t) { throw new Error("API " + r.status + ": " + t); });
      return r.json();
    })
    .then(function(data) {
      resVal.textContent = data.prediction;
      if (IS_CLASS && data.probabilities) {
        var probs  = Array.isArray(data.probabilities) ? data.probabilities : Object.values(data.probabilities);
        var labels = CLASSES.length ? CLASSES : probs.map(function(_,i){ return "Class " + i; });
        labels.forEach(function(cls, i) {
          var pct = ((probs[i] || 0) * 100).toFixed(1);
          var d = document.createElement("div");
          d.className = "prob-item";
          d.innerHTML = '<div class="prob-hdr"><span>' + cls + '</span><span>' + pct + '%</span></div>'
                      + '<div class="prob-bg"><div class="prob-fill" data-p="' + pct + '"></div></div>';
          probBars.appendChild(d);
        });
        probSec.style.display = "block";
        setTimeout(function() {
          document.querySelectorAll(".prob-fill").forEach(function(b) {
            b.style.width = b.dataset.p + "%";
          });
        }, 60);
      }
      result.classList.add("show");
    })
    .catch(function(err) {
      var msg = err.message || String(err);
      if (msg.indexOf("Failed to fetch") !== -1 || msg.indexOf("NetworkError") !== -1
          || msg.indexOf("ERR_CONNECTION_REFUSED") !== -1 || err instanceof TypeError) {
        msg = "⚠️ Cannot reach the API server.\n"
            + "Make sure uvicorn is running:\n"
            + "    uvicorn app:app --reload";
        srvDot.className = "srv-dot offline";
        srvTxt.textContent = "Server offline";
      }
      errMsg.style.whiteSpace = "pre-wrap";
      errMsg.textContent = msg;
      result.classList.add("show");
    })
    .finally(function() {
      pBtn.disabled = !_serverReady;
      pBtn.style.opacity = _serverReady ? "1" : "0.5";
      pBtn.innerHTML = "&#x1F50D;&nbsp; Predict";
    });
  });
</script>
</body>
</html>
